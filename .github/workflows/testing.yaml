name: Testing
on:
  pull_request:
  push:
    branches: ["*"]
    paths-ignore:
      - 'docs/**'
      - '*.md'
      - '*.rst'
    tags-ignore: ["*"]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python: ["3.11", "3.12", "3.13", "3.14"]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc make protobuf-compiler

      - name: Build libpg_query
        run: make -C libpg_query

      - name: Set up uv
        uses: astral-sh/setup-uv@v7
        with:
          python-version: "${{ matrix.python }}"

      - name: Sync dependencies
        run: uv sync --group dev

      - name: Lint check
        run: uv run pre-commit run --all-files

      - name: Run tests
        run: |
          mkdir -p build
          uv run pytest --cov --cov-report=term-missing --cov-report=xml:build/coverage.xml

      - name: Upload coverage
        uses: codecov/codecov-action@v5
        with:
          files: ./build/coverage.xml
          flags: unittests

  build:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            cibw-archs: x86_64
            cibw-build: "cp311-manylinux*"
          - os: ubuntu-latest
            cibw-archs: x86_64
            cibw-build: "cp311-musllinux*"
          - os: macos-14
            cibw-archs: arm64
            cibw-build: "cp311-macosx*"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Install build dependencies (Ubuntu)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc make protobuf-compiler

      - name: Install build dependencies (macOS)
        if: startsWith(matrix.os, 'macos')
        run: |
          brew install protobuf

      - name: Build wheels
        uses: pypa/cibuildwheel@v3.4.0
        env:
          CIBW_ARCHS: ${{ matrix.cibw-archs }}
          CIBW_BEFORE_ALL: "make -C libpg_query"
          CIBW_BUILD: ${{ matrix.cibw-build }}
          CIBW_CONFIG_SETTINGS: "--build-option=--py-limited-api=cp311"

      - name: Verify wheel (native)
        if: "!contains(matrix.cibw-build, 'musllinux')"
        run: |
          pipx run uv venv --python 3.13 /tmp/verify
          pipx run uv pip install --python /tmp/verify wheelhouse/*.whl
          /tmp/verify/bin/python -c "import pgparse; print(pgparse.fingerprint('SELECT 1'))"

      - name: Verify wheel (musllinux via Docker)
        if: contains(matrix.cibw-build, 'musllinux')
        run: |
          docker run --rm -v "$PWD/wheelhouse:/wheels" python:3.13-alpine \
            sh -c "pip install /wheels/*.whl && python -c \"import pgparse; print(pgparse.fingerprint('SELECT 1'))\""
